<main class="flex-shrink-0" style="margin-top: 72px;">

<section class="py-5 bg-light min-vh-100 d-flex align-items-center">
  <div class="container">

    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">

        <div class="card contact-card shadow-lg border-0">
          <div class="card-body p-5">

            <h2 class="section-title mb-4">Get In Touch</h2>

            <form action="mailto:tusharbiswas047@gmail.com"
                  method="POST"
                  enctype="text/plain">

              <div class="mb-4">
                <label class="form-label">Your Name</label>
                <input type="text" name="Name" class="form-control form-control-lg" required>
              </div>

              <div class="mb-4">
                <label class="form-label">Your Email</label>
                <input type="email" name="Email" class="form-control form-control-lg" required>
              </div>

              <div class="mb-4">
                <label class="form-label">Subject</label>
                <input type="text" name="Subject" class="form-control form-control-lg" required>
              </div>

              <div class="mb-4">
                <label class="form-label">Message</label>
                <textarea name="Message" rows="5"
                          class="form-control form-control-lg"
                          required></textarea>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-dark btn-lg">
                  Send Message
                </button>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>

  </div>
</section>
